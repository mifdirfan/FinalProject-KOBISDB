<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KOBIS Movie Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h2>KOBIS 영화 검색</h2>
    
    <form method="POST">
        <label>영화명:</label>
        <input type="text" name="movie_title_input">
        <button type="submit">검색 (Search)</button>
    </form>

    <hr>

    <table border="1">
        <tr>
            <th>영화명</th>
            <th>제작연도</th>
            <th>유형</th>
            <th>감독</th>
        </tr>
        
        {% for movie in movies %}
        <tr>
            <td>{{ movie['영화명'] }}</td>
            <td>{{ movie['제작연도'] }}</td>
            <td>{{ movie['유형'] }}</td>
            <td>{{ movie['감독이름'] }}</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
